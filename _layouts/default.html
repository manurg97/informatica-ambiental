<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informática-Ambiental</title>
    <style>
        :root {
            --bg-dark: #0f172a; /* Fondo principal oscuro */
            --sidebar-bg: #1e293b;
            --card-bg: #ffffff;
            --pablo: #38bdf8;
            --manuel: #4ade80;
            --sergio: #c084fc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-dark);
            color: #1e293b;
            min-height: 100vh;
        }

        /* --- MENÚ IZQUIERDA --- */
        nav {
            width: 300px;
            background-color: var(--sidebar-bg);
            position: fixed;
            height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        nav h1 {
            color: white;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        nav ul li { margin-bottom: 10px; }

        nav ul li a {
            color: var(--text-muted);
            text-decoration: none;
            display: block;
            padding: 12px 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        /* --- EFECTO REACCIÓN DERECHA --- */
        nav ul li a:hover {
            background: rgba(255,255,255,0.05);
            color: white;
            transform: translateX(15px);
        }

        .link-pablo:hover { box-shadow: -4px 0 0 var(--pablo); }
        .link-manuel:hover { box-shadow: -4px 0 0 var(--manuel); }
        .link-sergio:hover { box-shadow: -4px 0 0 var(--sergio); }

        /* --- LEYENDA SIMPLE --- */
        .leyenda-simple {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .autor {
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 12px;
        }

        /* --- CONTENEDOR CENTRAL --- */
        main {
            margin-left: 300px;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px;
        }

        .content-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 800px;
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            min-height: 80vh;
        }

        /* Estilos de texto dentro de las páginas */
        .content-card h1 { margin-top: 0; color: var(--bg-dark); border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        .content-card p { line-height: 1.8; color: #475569; font-size: 1.1rem; }
    </style>
</head>
<body>

    <nav>
        <h1>Informática Ambiental</h1>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="Pablo_contaminacion.html" class="link-pablo">Contaminación ambiental</a></li>
            <li><a href="Manuel_residuos.html" class="link-manuel">Residuos informáticos</a></li>
            <li><a href="Sergio_obsolescencia.html" class="link-sergio">Obsolescencia programada</a></li>
            <li><a href="Sergio_informatica.html" class="link-sergio">Informática ecológica</a></li>
            <li><a href="referencias.html">Referencias</a></li>
        </ul>

        <div class="leyenda-simple">
            <div class="autor"><span class="dot" style="background: var(--pablo);"></span> Pablo</div>
            <div class="autor"><span class="dot" style="background: var(--sergio);"></span> Sergio</div>
            <div class="autor"><span class="dot" style="background: var(--manuel);"></span> Manuel</div>
        </div>
    </nav>

    <main>
        <article class="content-card">
            {{ content }}
        </article>
    </main>

</body>
</html>
