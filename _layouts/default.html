<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Informática-Ambiental</title>
    <style>
        :root {
            --bg-body: #0f172a; /* Azul muy oscuro tipo terminal */
            --bg-card: #ffffff;
            --sidebar-color: #1e293b;
            --pablo-color: #38bdf8;   /* Azul cielo */
            --manuel-color: #4ade80;  /* Verde neón */
            --sergio-color: #c084fc;  /* Morado brillante */
            --text-nav: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-body);
            color: #334155;
            min-height: 100vh;
        }

        /* --- SIDEBAR IZQUIERDA --- */
        nav {
            width: 320px;
            background-color: var(--sidebar-color);
            color: white;
            position: fixed;
            height: 100vh;
            padding: 40px 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        nav h1 {
            font-size: 1.2rem;
            color: #f8fafc;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 40px;
            border-left: 4px solid var(--pablo-color);
            padding-left: 15px;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        nav ul li {
            margin-bottom: 8px;
        }

        nav ul li a {
            color: var(--text-nav);
            text-decoration: none;
            display: block;
            padding: 12px 15px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- EFECTO REACCIÓN A LA DERECHA --- */
        nav ul li a:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            transform: translateX(20px); /* Empuje a la derecha */
        }

        /* Colores de hover por autor */
        .pablo:hover { box-shadow: -4px 0 0 var(--pablo-color); }
        .manuel:hover { box-shadow: -4px 0 0 var(--manuel-color); }
        .sergio:hover { box-shadow: -4px 0 0 var(--sergio-color); }

        /* --- LEYENDA DE COLORES --- */
        .leyenda {
            margin-top: auto;
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .leyenda h3 {
            margin: 0 0 10px 0;
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
        }

        .autor-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .circle {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        main {
            margin-left: 320px;
            width: 100%;
            padding: 60px;
            display: flex;
            justify-content: center;
        }

        .content-wrapper {
            background: var(--bg-card);
            width: 100%;
            max-width: 850px;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Estilo Markdown básico */
        h1, h2 { color: #1e293b; }
        p { line-height: 1.7; font-size: 1.1rem; }
    </style>
</head>
<body>

    <nav>
        <h1>Informática-Ambiental</h1>
        
        <ul>
            <li><a href="index.html">🏠 Inicio</a></li>
            <li><a href="Pablo_contaminacion.html" class="pablo">🌍 Qué es la contaminación</a></li>
            <li><a href="Manuel_residuos.html" class="manuel">♻️ Residuos informáticos</a></li>
            <li><a href="Sergio_obsolescencia.html" class="sergio">⏳ Obsolescencia programada</a></li>
            <li><a href="Sergio_informatica.html" class="sergio">🍃 Informática ecológica</a></li>
            <li><a href="referencias.html">📚 Referencias</a></li>
        </ul>

        <div class="leyenda">
            <h3>Responsables</h3>
            <div class="autor-item">
                <div class="circle" style="background: var(--pablo-color);"></div>
                <span>Pablo: Contaminación</span>
            </div>
            <div class="autor-item">
                <div class="circle" style="background: var(--sergio-color);"></div>
                <span>Sergio: Info & Obsolescencia</span>
            </div>
            <div class="autor-item">
                <div class="circle" style="background: var(--manuel-color);"></div>
                <span>Manuel: Residuos</span>
            </div>
        </div>
    </nav>

    <main>
        <article class="content-wrapper">
            {{ content }}
        </article>
    </main>

</body>
</html>
