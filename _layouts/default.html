<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Informática Ambiental</title>

    <style>
        :root {
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #ffffff;
            --pablo: #38bdf8;
            --manuel: #4ade80;
            --sergio: #c084fc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-dark);
            color: #1e293b;
            min-height: 100vh;
        }

        /* --- BARRA LATERAL IZQUIERDA --- */
        nav {
            width: 260px;
            background-color: var(--sidebar-bg);
            position: fixed;
            left: 0;
            height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        nav h1 {
            color: white;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        nav ul { list-style: none; padding: 0; margin: 0; }
        nav ul li { margin-bottom: 8px; }

        nav ul li a {
            color: var(--text-muted);
            text-decoration: none;
            display: block;
            padding: 12px 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .nav-pablo:hover { color: var(--pablo) !important; background: rgba(56, 189, 248, 0.1); }
        .nav-manuel:hover { color: var(--manuel) !important; background: rgba(74, 222, 128, 0.1); }
        .nav-sergio:hover { color: var(--sergio) !important; background: rgba(192, 132, 252, 0.1); }
        .nav-ref:hover { color: white !important; background: rgba(255, 255, 255, 0.05); }

        /* --- PANEL DERECHO --- */
        aside {
            width: 240px;
            position: fixed;
            right: 0;
            height: 100vh;
            padding: 60px 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .author-card {
            background: rgba(30, 41, 59, 0.5);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .author-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
        .card-pablo { border-right: 4px solid var(--pablo); color: var(--pablo); }
        .card-manuel { border-right: 4px solid var(--manuel); color: var(--manuel); }
        .card-sergio { border-right: 4px solid var(--sergio); color: var(--sergio); }

        /* --- CONTENIDO CENTRAL --- */
        main {
            margin-left: 260px;
            margin-right: 240px;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            padding: 60px 40px;
        }

        .content-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 750px;
            padding: 50px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            min-height: 80vh;
        }

        .content-card h1 { color: var(--bg-dark); border-bottom: 3px solid #eee; padding-bottom: 10px; }
        .content-card p { line-height: 1.8; color: #475569; font-size: 1.1rem; }

        /* --- TARJETAS DE COLORES DE SERGIO (RESTAURADAS) --- */
        .card-premium {
            background: #ffffff;
            border: 1px solid #e1e4e8;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .border-green { border-top: 8px solid #2ea44f; }
        .border-blue { border-top: 8px solid #0366d6; }
        .border-orange { border-top: 8px solid #f66a0a; }
        .border-purple { border-top: 8px solid #6f42c1; }

        .card-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 12px;
            display: block;
        }

        .img-cartoon {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin: 20px auto;
            display: block;
        }

        .grid-visual {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .tabla-bonita {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .tabla-bonita thead { background: #2ea44f; color: white; }
        .tabla-bonita th, .tabla-bonita td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }

        .bottom-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .nav-link { color: #2ea44f; text-decoration: none; font-weight: bold; }

        @media (max-width: 1100px) {
            body { flex-direction: column; }
            nav, aside { width: 100%; height: auto; position: relative; }
            main { margin: 0; padding: 20px; }
            aside { flex-direction: row; justify-content: center; background: none; }
        }
    </style>
</head>

<body>

    <nav>
        <h1><strong>Informática-Ambiental</strong></h1>
        <ul>
            <li><a href="./index.html" class="nav-ref">Inicio</a></li>
            <li><a href="./Pablo_contaminacion.html" class="nav-pablo">Qué es la contaminación</a></li>
            <li><a href="./Manuel_residuos.html" class="nav-manuel">Residuos informáticos</a></li>
            <li><a href="./Sergio_obsolescencia.html" class="nav-sergio">Obsolescencia programada</a></li>
            <li><a href="./Sergio_informatica.html" class="nav-sergio">Informática Ecológica</a></li>
            <li><a href="./referencias.html" class="nav-ref">Referencias</a></li>
        </ul>
    </nav>

    <main>
        <div class="content-card">
            {{ content }}
        </div>
    </main>

    <aside>
        <div class="author-card card-pablo"><span class="author-name">Pablo</span></div>
        <div class="author-card card-manuel"><span class="author-name">Manuel</span></div>
        <div class="author-card card-sergio"><span class="author-name">Sergio</span></div>
    </aside>

</body>
</html>
